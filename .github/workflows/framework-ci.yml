name: framework-ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency: # validation CI: cancelling superseded runs is correct here
  group: framework-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Third-party Actions are pinned to a commit SHA (standards/07 §1.7), with the
      # version tag in a trailing comment so updates stay reviewable.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - run: node controls/check.mjs
      - run: node controls/workflow-policy.mjs # the framework lints its own workflows
      - run: node controls/workflow-policy.test.mjs # fixtures for the workflow-policy lint
